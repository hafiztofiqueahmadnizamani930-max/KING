    <script>
        // TARGET UPGRADED WORKER
        const WORKER_PROXY_URL = 'https://sim-api.fakcloud.tech/';
        
        const toastContainer = document.getElementById('toast-container');
        const themeIcon = document.getElementById('theme-icon');
        const htmlDoc = document.documentElement;
        
        let searchHistory = JSON.parse(localStorage.getItem('fak_history') || '[]');

        function toggleTheme() {
            htmlDoc.classList.toggle('dark');
            const isDark = htmlDoc.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeIcon.className = isDark ? 'bi bi-moon-stars-fill text-lg' : 'bi bi-sun-fill text-lg';
        }

        function initTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'light') {
                htmlDoc.classList.remove('dark');
                themeIcon.className = 'bi bi-sun-fill text-lg';
            } else {
                themeIcon.className = 'bi bi-moon-stars-fill text-lg';
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            const bgClass = isError ? 'bg-red-500' : 'bg-slate-900 dark:bg-black border-l-4 border-fak-500';
            const textClass = isError ? 'text-white' : 'text-white dark:text-fak-500';
            const icon = isError ? 'bi-shield-x' : 'bi-shield-check text-fak-500';
            
            toast.className = `flex items-center gap-3 px-4 py-3 rounded-r-xl shadow-lg font-mono text-xs border border-slate-800 transition-all duration-300 toast-enter ${bgClass} ${textClass} pointer-events-auto shadow-[0_0_15px_rgba(0,229,255,0.2)]`;
            toast.innerHTML = `<i class="bi ${icon} text-lg"></i> <span>${msg}</span>`;
            
            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.add('toast-active'));

            setTimeout(() => {
                toast.classList.remove('toast-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function switchTab(tab) {
            const viewSearch = document.getElementById('view-search');
            const viewHistory = document.getElementById('view-history');
            const tabSearch = document.getElementById('tab-search');
            const tabHistory = document.getElementById('tab-history');

            const activeClass = ['bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-fak-600', 'dark:text-fak-500'];
            const inactiveClass = ['text-slate-500', 'dark:text-slate-400', 'hover:text-slate-900', 'dark:hover:text-white', 'bg-transparent'];
            if (tab === 'search') {
                viewSearch.classList.remove('hidden');
                viewHistory.classList.add('hidden');
                viewHistory.classList.remove('flex');
                
                tabSearch.classList.add(...activeClass);
                tabSearch.classList.remove(...inactiveClass);
                tabHistory.classList.add(...inactiveClass);
                tabHistory.classList.remove(...activeClass);
            } else {
                viewSearch.classList.add('hidden');
                viewHistory.classList.remove('hidden');
                viewHistory.classList.add('flex');
                
                tabHistory.classList.add(...activeClass);
                tabHistory.classList.remove(...inactiveClass);
                tabSearch.classList.add(...inactiveClass);
                tabSearch.classList.remove(...activeClass);
                renderHistory();
            }
        }

        function copyToClipboard(text, btnElement) {
            const originalHTML = btnElement.innerHTML;
            
            const successAction = () => {
                btnElement.innerHTML = '<i class="bi bi-check2-all"></i> Copied';
                btnElement.classList.replace('text-slate-500', 'text-fak-500');
                btnElement.classList.replace('dark:text-slate-400', 'dark:text-fak-500');
                showToast('Data copied to clipboard');
                setTimeout(() => {
                    btnElement.innerHTML = originalHTML;
                    btnElement.classList.replace('text-fak-500', 'text-slate-500');
                    btnElement.classList.replace('dark:text-fak-500', 'dark:text-slate-400');
                }, 2000);
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(successAction).catch(() => fallbackCopy(text, successAction));
            } else {
                fallbackCopy(text, successAction);
            }
        }

        function fallbackCopy(text, successAction) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.left = "-999999px";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                successAction();
            } catch (err) {
                showToast('Copy failed. Select text manually', true);
            }
            textArea.remove();
        }

        function addToHistory(number, name) {
            const entry = { number, name: name || 'UNKNOWN_ENTITY', time: new Date().toLocaleString() };
            // Avoid exact duplicates back-to-back
            if (searchHistory.length > 0 && searchHistory[0].number === number) return;
            
            searchHistory.unshift(entry);
            if (searchHistory.length > 50) searchHistory.pop();
            localStorage.setItem('fak_history', JSON.stringify(searchHistory));
        }

        function clearHistory() {
            searchHistory = [];
            localStorage.removeItem('fak_history');
            renderHistory();
            showToast('Local cache purged');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (searchHistory.length === 0) {
                list.innerHTML = `<div class="text-center py-8 text-slate-500 dark:text-slate-500 bg-white dark:bg-black/40 rounded-xl border border-slate-200 dark:border-slate-800 font-mono text-sm"><i class="bi bi-x-circle text-2xl mb-2 block text-slate-600"></i>NO LOGS FOUND</div>`;
                return;
            }

            list.innerHTML = searchHistory.map(item => `
                <div class="bg-white dark:bg-black/60 border border-slate-200 dark:border-slate-800 p-4 rounded-xl flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:border-fak-500/50 transition-all cursor-pointer group" onclick="reRunSearch('${item.number}')">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-lg bg-slate-100 dark:bg-slate-900 flex items-center justify-center text-slate-400 group-hover:text-fak-500 transition-colors font-bold border border-transparent group-hover:border-fak-500/30">
                            <i class="bi bi-incognito"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-900 dark:text-fak-500 tracking-wider font-mono">${item.number}</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 font-mono">${item.name}</p>
                        </div>
                    </div>
                    <div class="text-[10px] text-slate-400 dark:text-slate-600 flex items-center gap-1 font-mono uppercase tracking-widest">
                        <i class="bi bi-clock-history"></i> ${item.time}
                    </div>
                </div>
            `).join('');
        }

        function reRunSearch(num) {
            document.getElementById('lookup-input').value = num;
            switchTab('search');
            document.getElementById('lookup-form').dispatchEvent(new Event('submit'));
        }

        function buildResultCard(apiResponse) {
            // New cyber payload data map
            const meta = apiResponse;
            const records = meta.data?.records || [];
            
            if (records.length === 0) {
                return renderError('DECRYPTION FAILED', 'Target exists but data node returned zero readable records.');
            }

            // Create plain text for copying all records
            let copyData = `--- Dark-Empire SECURE EXPORT ---\n`;
            records.forEach((item, i) => {
                copyData += `\n[RECORD ${i+1}]\nPhone: ${item.phone || 'N/A'}\nName: ${item.full_name || 'N/A'}\nCNIC: ${item.cnic || 'N/A'}\nAddress: ${item.address || 'N/A'}\n`;
            });
            copyData += `\nNode: ${meta.proxy_node || 'UNKNOWN'}\nEOF`;

            // HTML generation for individual records
            const recordsHtml = records.map((item, index) => `
                <div class="p-6 flex flex-col gap-4 border-b border-slate-200 dark:border-slate-800 last:border-0 relative">
                    ${records.length > 1 ? `<div class="absolute left-0 top-0 bottom-0 w-1 bg-fak-500"></div><div class="text-[10px] font-bold text-fak-500 mb-2 font-mono tracking-widest pl-2">LINKED RECORD _0${index + 1}</div>` : ''}
                    ${generateDataRow('MOBILE MSISDN', item.phone)}
                    ${generateDataRow('TARGET IDENTITY', item.full_name)}
                    ${generateDataRow('NATIONAL ID (CNIC)', item.cnic)}
                    ${generateDataRow('REGISTERED LOCATION', item.address)}
                </div>
            `).join('');
            
            return `
                <div class="bg-white dark:bg-black border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden shadow-2xl mt-6 relative z-10 group">
                    <div class="absolute inset-0 bg-gradient-to-b from-fak-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                    
                    <!-- Cyber Telemetry Terminal Output -->
                    <div class="bg-slate-900 text-green-400 p-4 font-mono text-[11px] leading-relaxed border-b-2 border-fak-500/30">
                        <div class="text-slate-400 mb-2">====  TERMINAL CONNECTION ESTABLISHED ====</div>
                        <div class="flex gap-2"><span class="text-fak-500">> SYS_STATUS:</span> ${meta.sys_status || 'OK'}</div>
                        <div class="flex gap-2"><span class="text-fak-500">> RELAY_NODE:</span> ${meta.proxy_node || 'TERMINAL-ALPHA-09'}</div>
                        <div class="flex gap-2"><span class="text-fak-500">> LATENCY:</span> ${meta.routing_latency || '14ms'}</div>
                        <div class="flex gap-2"><span class="text-fak-500">> HANDSHAKE:</span> ${meta.encryption_layer || 'AES-256-GCM / RSA-4096'}</div>
                        <div class="flex gap-2"><span class="text-fak-500">> CHECKSUM:</span> ${meta.data_integrity_checksum || '0xUNKNOWN'}</div>
                        <div class="text-slate-400 mt-2">==== PACKET DECRYPTION SUCCESSFUL ====</div>
                    </div>

                    <div class="bg-slate-50 dark:bg-slate-900 px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center">
                        <h3 class="font-mono font-bold text-slate-900 dark:text-white flex items-center gap-2 text-sm tracking-widest">
                            <i class="bi bi-fingerprint text-fak-500 text-lg"></i> TARGET RESOLVED
                        </h3>
                        <button onclick="copyToClipboard(\`${copyData.replace(/`/g, '\\`')}\`, this)" class="text-xs font-mono font-bold text-slate-500 dark:text-slate-400 hover:text-fak-500 dark:hover:text-fak-400 flex items-center gap-2 transition-colors bg-white dark:bg-black px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 shadow-sm hover:border-fak-500/50">
                            <i class="bi bi-files"></i> COPY EXPORT
                        </button>
                    </div>
                    
                    <div class="flex flex-col">
                        ${recordsHtml}
                    </div>
                </div>
            `;
        }

        function generateDataRow(label, val) {
            return `
                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-baseline py-3 border-b border-dashed border-slate-200 dark:border-slate-800/50 last:border-0 last:pb-0">
                    <span class="text-[10px] font-mono text-slate-400 dark:text-slate-500 tracking-widest mb-1 sm:mb-0 uppercase">${label}</span>
                    <span class="text-base font-semibold text-slate-900 dark:text-white sm:text-right break-all font-mono">${val || '<span class="text-red-500/70">NULL</span>'}</span>
                </div>
            `;
        }

        function renderError(title, msg) {
            return `
                <div class="bg-red-50 dark:bg-black border border-red-200 dark:border-red-900/50 rounded-2xl p-6 text-center mt-6 relative overflow-hidden shadow-[0_0_30px_rgba(239,68,68,0.1)]">
                    <div class="absolute inset-0 cyber-grid opacity-20 dark:opacity-10 pointer-events-none"></div>
                    <i class="bi bi-shield-x text-5xl text-red-500 mb-3 block relative z-10 animate-pulse"></i>
                    <h3 class="text-lg font-mono font-bold text-red-600 dark:text-red-500 mb-2 tracking-widest relative z-10">[ ${title} ]</h3>
                    <p class="text-xs font-mono text-red-500/80 dark:text-red-400/70 relative z-10 uppercase">${msg}</p>
                </div>
            `;
        }

        document.getElementById('lookup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inputEl = document.getElementById('lookup-input');
            const btnEl = document.getElementById('submit-btn');
            const container = document.getElementById('results-container');
            
            const rawVal = inputEl.value.trim();
            const cleanNum = rawVal.replace(/[^0-9]/g, '');

            if (cleanNum.length < 10) {
                showToast('REJECTED: INVALID FORMAT', true);
                return;
            }

            container.classList.remove('hidden');
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center p-12 bg-white dark:bg-black/50 border border-slate-200 dark:border-slate-800 rounded-2xl mt-6 shadow-[0_0_20px_rgba(0,229,255,0.05)]">
                    <div class="relative w-16 h-16 mb-6">
                        <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-fak-500 rounded-full border-t-transparent animate-spin"></div>
                        <i class="bi bi-lock-fill absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-600"></i>
                    </div>
                    <div class="text-xs text-fak-500 font-mono tracking-widest animate-pulse-fast text-center">
                        <div>ROUTING THROUGH SERVERNODES...</div>
                        <div class="text-slate-500 mt-2 text-[10px]">BYPASSING FIREWALLS</div>
                    </div>
                </div>
            `;
            
            btnEl.disabled = true;
            btnEl.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Changed from ?number= to ?q=
                const res = await fetch(`${WORKER_PROXY_URL}?q=${cleanNum}`);
                const responseData = await res.json();

                // Because of our custom worker, data is inside responseData.data.records
                if (res.ok && responseData.success && responseData.data && responseData.data.records && responseData.data.records.length > 0) {
                    showToast('TRACE COMPLETED');
                    container.innerHTML = buildResultCard(responseData);
                    
                    const firstRecord = responseData.data.records[0];
                    addToHistory(firstRecord.phone || cleanNum, firstRecord.full_name);
                } 
                else if (responseData.success === false && responseData.sys_status === "OFFLINE") {
                    // Handled specific  Offline Error
                    container.innerHTML = renderError('SERVER CONNECTION FAILED', responseData.diagnostic || 'Unable to establish secure tunnel to target API.');
                }
                else {
                    container.innerHTML = renderError('DATA NOT FOUND', 'The targeted identity does not exist in the current database node.');
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = renderError('CONNECTION TIMEOUT', 'Failed to reach FAK LaB servers. Check your local connection.');
            } finally {
                btnEl.disabled = false;
                btnEl.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        initTheme();
    </script>
</body>
</html>
